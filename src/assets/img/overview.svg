<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="Montserrat, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#34495e"/>
    </marker>
    <style>
      .title { font-size: 20px; font-weight: 700; fill: #2c3e50; }
      .part { font-size: 14px; font-weight: 700; fill: #ffffff; }
      .box-label { font-size: 15px; font-weight: 700; fill: #2c3e50; }
      .box-sub { font-size: 11px; fill: #5d6d7e; }
      .edge { font-size: 11px; fill: #34495e; font-style: italic; }
      .stream { font-size: 10px; fill: #7f8c8d; }
    </style>
  </defs>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" class="title">OGC API – Connected Systems resource model</text>

  <!-- Part 1 banner -->
  <rect x="40" y="60" width="880" height="28" rx="4" fill="#2980b9"/>
  <text x="480" y="79" text-anchor="middle" class="part">PART 1 — FEATURE RESOURCES (descriptions, discovery, sampling)</text>

  <!-- Procedure -->
  <rect x="60" y="110" width="180" height="80" rx="8" fill="#ecf0f1" stroke="#2980b9" stroke-width="2"/>
  <text x="150" y="142" text-anchor="middle" class="box-label">Procedure</text>
  <text x="150" y="162" text-anchor="middle" class="box-sub">methodology / model</text>
  <text x="150" y="178" text-anchor="middle" class="box-sub">SensorML</text>

  <!-- System -->
  <rect x="290" y="110" width="180" height="80" rx="8" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="380" y="142" text-anchor="middle" class="box-label" fill="#ffffff">System</text>
  <text x="380" y="162" text-anchor="middle" class="box-sub" fill="#ecf0f1">sensor / platform / process</text>
  <text x="380" y="178" text-anchor="middle" class="box-sub" fill="#ecf0f1">may nest sub-systems</text>

  <!-- Deployment -->
  <rect x="520" y="110" width="180" height="80" rx="8" fill="#ecf0f1" stroke="#2980b9" stroke-width="2"/>
  <text x="610" y="142" text-anchor="middle" class="box-label">Deployment</text>
  <text x="610" y="162" text-anchor="middle" class="box-sub">instance @ place / time</text>
  <text x="610" y="178" text-anchor="middle" class="box-sub">lifecycle of a System</text>

  <!-- Sampling Feature -->
  <rect x="750" y="110" width="170" height="80" rx="8" fill="#ecf0f1" stroke="#2980b9" stroke-width="2"/>
  <text x="835" y="142" text-anchor="middle" class="box-label">Sampling Feature</text>
  <text x="835" y="162" text-anchor="middle" class="box-sub">where / how it sampled</text>
  <text x="835" y="178" text-anchor="middle" class="box-sub">point / curve / surface</text>

  <!-- Feature of Interest -->
  <rect x="380" y="220" width="200" height="64" rx="8" fill="#ecf0f1" stroke="#2980b9" stroke-width="2"/>
  <text x="480" y="248" text-anchor="middle" class="box-label">Feature of Interest</text>
  <text x="480" y="268" text-anchor="middle" class="box-sub">real-world thing observed / acted on</text>

  <!-- Edges Part 1 -->
  <line x1="240" y1="150" x2="290" y2="150" stroke="#34495e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="265" y="142" text-anchor="middle" class="edge">implements</text>
  <line x1="470" y1="150" x2="520" y2="150" stroke="#34495e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="495" y="142" text-anchor="middle" class="edge">deployed as</text>
  <line x1="700" y1="150" x2="750" y2="150" stroke="#34495e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="725" y="142" text-anchor="middle" class="edge">samples at</text>
  <line x1="380" y1="190" x2="430" y2="220" stroke="#34495e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="835" y1="190" x2="555" y2="225" stroke="#34495e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="700" y="215" text-anchor="middle" class="edge">about</text>

  <!-- Part 2 banner -->
  <rect x="40" y="312" width="880" height="28" rx="4" fill="#27ae60"/>
  <text x="480" y="331" text-anchor="middle" class="part">PART 2 — DYNAMIC DATA (live streams &amp; tasking, historical archives)</text>

  <!-- Datastream -->
  <rect x="100" y="362" width="220" height="90" rx="8" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <text x="210" y="392" text-anchor="middle" class="box-label" fill="#ffffff">Datastream</text>
  <text x="210" y="412" text-anchor="middle" class="box-sub" fill="#ecf0f1">channel for Observations</text>
  <text x="210" y="430" text-anchor="middle" class="box-sub" fill="#ecf0f1">SWE Common payloads</text>
  <text x="210" y="446" text-anchor="middle" class="box-sub" fill="#ecf0f1">historical + live</text>

  <!-- Observation -->
  <rect x="350" y="380" width="160" height="54" rx="8" fill="#ecf0f1" stroke="#27ae60" stroke-width="2"/>
  <text x="430" y="404" text-anchor="middle" class="box-label">Observation</text>
  <text x="430" y="421" text-anchor="middle" class="box-sub">measured value(s)</text>

  <!-- ControlStream -->
  <rect x="640" y="362" width="220" height="90" rx="8" fill="#e67e22" stroke="#d35400" stroke-width="2"/>
  <text x="750" y="392" text-anchor="middle" class="box-label" fill="#ffffff">ControlStream</text>
  <text x="750" y="412" text-anchor="middle" class="box-sub" fill="#ecf0f1">channel for Commands</text>
  <text x="750" y="430" text-anchor="middle" class="box-sub" fill="#ecf0f1">tasking + status</text>
  <text x="750" y="446" text-anchor="middle" class="box-sub" fill="#ecf0f1">historical + live</text>

  <!-- Command -->
  <rect x="540" y="380" width="80" height="54" rx="8" fill="#ecf0f1" stroke="#d35400" stroke-width="2"/>
  <text x="580" y="404" text-anchor="middle" class="box-label">Command</text>
  <text x="580" y="421" text-anchor="middle" class="box-sub">tasking instr.</text>

  <!-- Stream layer caption -->
  <rect x="100" y="475" width="760" height="56" rx="6" fill="#fdfefe" stroke="#bdc3c7" stroke-dasharray="4 3"/>
  <text x="480" y="498" text-anchor="middle" class="edge">delivered over HTTP · WebSocket · MQTT</text>
  <text x="480" y="518" text-anchor="middle" class="stream">same model exposes the historical archive (paged, filtered, time-windowed) and the live stream</text>

  <!-- Part 1 ↔ Part 2 link -->
  <line x1="380" y1="284" x2="270" y2="362" stroke="#34495e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="295" y="320" class="edge">produces</text>
  <line x1="580" y1="284" x2="700" y2="362" stroke="#34495e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="660" y="320" class="edge">accepts</text>

  <!-- Inner Part 2 edges -->
  <line x1="320" y1="407" x2="350" y2="407" stroke="#34495e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="620" y1="407" x2="640" y2="407" stroke="#34495e" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
